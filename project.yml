name: HomeKitMCP
options:
  bundleIdPrefix: com.novoa
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

configs:
  Dev Debug: debug
  Dev Release: release
  Prod Debug: debug
  Prod Release: release

packages:
  Vapor:
    url: https://github.com/vapor/vapor.git
    from: "4.89.0"

schemes:
  HomeKitMCP:
    build:
      targets:
        HomeKitMCP: all
        HomeKitMCPTests: [test]
    run:
      config: Dev Debug
    test:
      config: Dev Debug
      targets:
        - HomeKitMCPTests
  HomeKitMCP-Prod:
    build:
      targets:
        HomeKitMCP: all
    run:
      config: Prod Debug

targets:
  HomeKitMCP:
    type: application
    platform: iOS
    supportedDestinations: [macCatalyst]
    sources:
      - HomeKitMCP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.novoa.HomeKitMCP
        PRODUCT_NAME: HomeKitMCP
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        INFOPLIST_FILE: HomeKitMCP/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HomeKitMCP/Resources/HomeKitMCP.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KT7JRD4C5Y
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Dev Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG DEV_ENVIRONMENT
        Dev Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV_ENVIRONMENT
        Prod Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Prod Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: Vapor
      - target: MenuBarPlugin
    entitlements:
      path: HomeKitMCP/Resources/HomeKitMCP.entitlements
      properties:
        com.apple.developer.homekit: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.novoa.HomeKitMCP
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  HomeKitMCPTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations: [macCatalyst]
    sources:
      - HomeKitMCPTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.novoa.HomeKitMCPTests
        SWIFT_VERSION: "5.9"
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        DEVELOPMENT_TEAM: KT7JRD4C5Y
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: HomeKitMCP

  MenuBarPlugin:
    type: bundle
    platform: macOS
    sources:
      - MenuBarPlugin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.novoa.HomeKitMCP.MenuBarPlugin
        PRODUCT_NAME: MenuBarPlugin
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: MenuBarPlugin/Info.plist
        SKIP_INSTALL: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KT7JRD4C5Y
        COMBINE_HIDPI_IMAGES: "YES"
