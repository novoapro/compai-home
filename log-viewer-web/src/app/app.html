<header class="app-header">
  <div class="header-left">
    <div class="logo">
      <app-icon name="house" [size]="20" />
      <span class="logo-text">HomeKit Logs</span>
    </div>
    <nav class="nav-tabs">
      <a routerLink="/logs" routerLinkActive="active" class="nav-tab">Logs</a>
      <a routerLink="/workflows" routerLinkActive="active" class="nav-tab">Workflows</a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-tab">Settings</a>
    </nav>
  </div>
  <div class="header-right">
    @if (polling.lastPollTime()) {
      <span class="poll-info">
        Updated {{ polling.lastPollTime()!.toLocaleTimeString() }}
      </span>
    }
    <button class="header-btn" (click)="onRefresh()" title="Refresh">
      <app-icon name="refresh-circle-fill" [size]="18" />
    </button>
    <button class="header-btn" (click)="theme.toggle()" [title]="theme.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
      <app-icon [name]="theme.isDarkMode() ? 'sun' : 'moon'" [size]="18" />
    </button>
    <div class="connection-dot" [class.connected]="config.isConfigured()" [title]="config.isConfigured() ? 'Connected' : 'Not configured'"></div>
  </div>
</header>
<main class="app-content">
  <router-outlet />
</main>
