name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable code signing in CI (no Apple Developer identity on runners)
  CI_XCODEBUILD_FLAGS: >-
    CODE_SIGN_IDENTITY=""
    CODE_SIGNING_REQUIRED=NO
    CODE_SIGNING_ALLOWED=NO

jobs:
  swift:
    name: Swift Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -scheme CompAI-Home \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -configuration 'Dev Debug' \
            -resolvePackageDependencies \
            $CI_XCODEBUILD_FLAGS

      - name: Build
        run: |
          xcodebuild -scheme CompAI-Home \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -configuration 'Dev Debug' \
            build \
            $CI_XCODEBUILD_FLAGS

      - name: Test
        run: |
          xcodebuild -scheme CompAI-Home \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -configuration 'Dev Debug' \
            test \
            $CI_XCODEBUILD_FLAGS

  web:
    name: Web App Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: webclient
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webclient/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
